<div class="loading-overlay"
     hx-post="/pages/search"
     hx-trigger="every 1s"
     hx-target="#main-content"
     hx-swap="innerHTML"
     hx-vals='js:{"query": "{{ query }}", "offset": {{ offset }}, "limit": {{ limit }}}'>
  {% if error %}
  <span style="color: var(--danger);">{{ t("search.error", message=error) }}</span>
  {% elif total > 0 %}
  {{ t("search.fetching", fetched=fetched, total=total) }}
  {% else %}
  {{ t("search.loading") }}
  {% endif %}
</div>
