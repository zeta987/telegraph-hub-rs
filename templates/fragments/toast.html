<div class="toast toast-{{ variant }}" role="alert">
  <strong>{{ message }}</strong>
  {% if url %}
  <a href="{{ url }}" target="_blank" rel="noopener" class="toast-link">{{ t("toast.open_page") }}</a>
  {% endif %}
  <button type="button" class="toast-close" data-click="closeToast">&times;</button>
</div>
