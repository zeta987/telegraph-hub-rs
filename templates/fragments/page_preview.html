<div class="preview-header">
  <div class="preview-header-top">
    <h3 class="preview-title">{{ title }}</h3>
    <button class="btn btn-sm btn-outline preview-close-btn" onclick="closePreview()" title="{{ t("preview.close") }}">&times;</button>
  </div>
  <div class="preview-meta">
    {% if author_name %}<span class="preview-author">{{ author_name }}</span>{% endif %}
    <span class="preview-views">{{ t("preview.views", count=views) }}</span>
    <a href="{{ url }}" target="_blank" rel="noopener" class="btn btn-xs btn-outline">{{ t("preview.open_new_tab") }}</a>
  </div>
</div>
<div class="preview-body">
  {{ content|safe }}
</div>
