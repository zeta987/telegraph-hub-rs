{% extends "base.html" %}

{% block title %}Telegraph Hub - Token Manager{% endblock %}

{% block content %}
<div class="grid-2">
  <!-- Create new account -->
  <div class="card">
    <h2 class="card-title">Create New Account</h2>
    <form hx-post="/account/create" hx-target="#account-result" hx-swap="innerHTML">
      <div class="form-group">
        <label for="short_name">Short Name <span class="required">*</span></label>
        <input type="text" id="short_name" name="short_name" required maxlength="32"
               placeholder="My Telegraph Account">
      </div>
      <div class="form-group">
        <label for="author_name">Author Name</label>
        <input type="text" id="author_name" name="author_name" maxlength="128"
               placeholder="Optional author name">
      </div>
      <div class="form-group">
        <label for="author_url">Author URL</label>
        <input type="url" id="author_url" name="author_url" maxlength="512"
               placeholder="https://example.com">
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>
  </div>

  <!-- Import existing token -->
  <div class="card">
    <h2 class="card-title">Import Existing Token</h2>
    <form onsubmit="importToken(event)">
      <div class="form-group">
        <label for="import_name">Label <span class="required">*</span></label>
        <input type="text" id="import_name" required placeholder="e.g. My Main Account">
      </div>
      <div class="form-group">
        <label for="import_token">Access Token <span class="required">*</span></label>
        <input type="text" id="import_token" required
               placeholder="Paste your access_token here">
      </div>
      <button type="submit" class="btn btn-secondary">Import Token</button>
    </form>

    <hr>
    <div class="card-header">
      <h3>Saved Tokens</h3>
      <div class="btn-group">
        <button class="btn btn-xs btn-outline" onclick="exportTokens()">Export</button>
        <button class="btn btn-xs btn-outline" onclick="importTokensFromFile()">Import File</button>
      </div>
    </div>
    <div id="saved-tokens-list">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<!-- Account operation results -->
<div id="account-result" class="mt-2"></div>

<!-- Account info section -->
<div class="card mt-2" id="account-info-section" style="display:none;">
  <h2 class="card-title">Account Info</h2>
  <div id="account-info-content">
    <p class="text-muted">Select a token above, then click "Load Info" to view account details.</p>
  </div>
  <div class="btn-group mt-1">
    <button class="btn btn-primary" onclick="loadAccountInfo()">Load Info</button>
    <button class="btn btn-danger" onclick="revokeToken()">Revoke &amp; Regenerate Token</button>
  </div>
</div>
{% endblock %}
