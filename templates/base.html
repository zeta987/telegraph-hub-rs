<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Telegraph Hub{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="/" class="brand">Telegraph Hub</a>
      <div class="nav-links">
        <a href="/" class="nav-link">Tokens</a>
        <a href="#" class="nav-link" onclick="loadPages(); return false;">Pages</a>
        <button class="btn btn-sm btn-outline" onclick="toggleTheme()">Theme</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <!-- Token selector bar -->
    <div class="token-bar" id="token-bar">
      <label for="token-select">Active Token:</label>
      <select id="token-select" onchange="onTokenChange()">
        <option value="">-- Select a token --</option>
      </select>
      <span id="token-name" class="token-name"></span>
    </div>

    <!-- Toast container for notifications -->
    <div id="toast-container"></div>

    <!-- Content area: page list + optional preview panel -->
    <div id="content-wrapper" class="content-wrapper">
      <div id="main-content">
        {% block content %}{% endblock %}
      </div>
      <aside id="preview-panel" class="preview-panel" style="display:none"></aside>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Telegraph Hub RS &mdash; Open source Telegraph page manager</p>
    </div>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
