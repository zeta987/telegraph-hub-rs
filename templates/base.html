<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ t("nav.brand") }}{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="/" class="brand">
        <img src="/static/logo.png" alt="" class="brand-logo">
        <span>{{ t("nav.brand") }}</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link">{{ t("nav.tokens") }}</a>
        <a href="#" class="nav-link" onclick="loadPages(); return false;">{{ t("nav.pages") }}</a>
        <button class="btn btn-sm btn-outline" onclick="toggleTheme()">{{ t("nav.theme") }}</button>
        <span class="lang-switcher">
          <button class="btn btn-sm btn-outline {% if lang == 'en' %}active{% endif %}"
                  onclick="setLang('en')">EN</button>
          <button class="btn btn-sm btn-outline {% if lang == 'zh-TW' %}active{% endif %}"
                  onclick="setLang('zh-TW')">繁中</button>
          <button class="btn btn-sm btn-outline {% if lang == 'zh-CN' %}active{% endif %}"
                  onclick="setLang('zh-CN')">简中</button>
        </span>
      </div>
    </div>
  </nav>

  <main class="container">
    <!-- Token selector bar -->
    <div class="token-bar" id="token-bar">
      <label for="token-select">{{ t("token.active_label") }}</label>
      <select id="token-select" onchange="onTokenChange()">
        <option value="">{{ t("token.select_placeholder") }}</option>
      </select>
      <span id="token-name" class="token-name"></span>
    </div>

    <!-- Toast container for notifications -->
    <div id="toast-container"></div>

    <!-- Content area: page list + optional preview panel -->
    <div id="content-wrapper" class="content-wrapper">
      <div id="main-content">
        {% block content %}{% endblock %}
      </div>
      <aside id="preview-panel" class="preview-panel" style="display:none"></aside>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>{{ t("footer.description") }}</p>
    </div>
  </footer>

  <script>window.i18n = {{ js_translations | tojson | safe }};</script>
  <script src="/static/app.js"></script>
</body>
</html>
